name: Compile

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, ready_for_review ]

jobs:
  build:
    name: Compile Integration
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1
        with:
          cache: true

      - name: Lint
        run: pnpm lint --quiet

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
